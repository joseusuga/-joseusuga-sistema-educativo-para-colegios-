<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - GranCole</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="container">
    <div class="left-section">
    
    </div>

    <div class="right-section">
      <div class="login-card">
        <!-- Logo centrado -->
        <img src="assets/img/logo-sena.png.jpeg" alt="Logo SENA" class="logo">

        <h1 class="welcome">Bienvenido a Gransena</h1>
        <p class="subtitle">Inicia sesión para continuar</p>

        <!-- tarjeta blanca dentro del área derecha -->
        <div class="card">
          <h2 class="card-title">Iniciar Sesión</h2>
          <p class="card-sub">Ingresa tus credenciales para acceder al sistema</p>

          <form id="loginForm" class="login-form" novalidate>
            <!-- Usuario -->
            <label for="usuario">Usuario</label>
            <div class="input-group">
              <!-- icono izquierdo (SVG inline) -->
              <span class="icon-left" aria-hidden="true">
                <!-- user icon -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 12a5 5 0 100-10 5 5 0 000 10zM3 21a9 9 0 0118 0" stroke="#9aa3b2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>

              <input id="usuario" name="usuario" type="text" placeholder="0000000" required autocomplete="username" />

              <!-- botón pequeño rojo (acción) -->
              <div class="right-actions">
                <button type="button" class="more-btn" title="Más opciones" aria-hidden="true">⋯</button>
              </div>
            </div>

            <!-- Contraseña -->
            <label for="password">Contraseña</label>
            <div class="input-group">
              <span class="icon-left" aria-hidden="true">
                <!-- lock icon -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="3" y="11" width="18" height="10" rx="2" stroke="#9aa3b2" stroke-width="1.5"/>
                  <path d="M7 11V8a5 5 0 0110 0v3" stroke="#9aa3b2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>

              <input id="password" name="password" type="password" placeholder="••••••" required autocomplete="current-password" />

              <div class="right-actions">
                <!-- ojo para mostrar/ocultar -->
                <button type="button" class="toggle-btn" aria-label="Mostrar contraseña">👁</button>
                <button type="button" class="more-btn" title="Más opciones" aria-hidden="true">⋯</button>
              </div>
            </div>

            <div class="row-between">
              <div></div>
              <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
            </div>

            <button class="submit-btn" type="submit">Iniciar Sesión <span class="arrow">→</span></button>

            <p class="small-text">¿No tienes cuenta? <a href="#">Contacta al administrador</a></p>

            <p class="copyright">© 2025 Gransena Pro. Todos los derechos son reservados.</p>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
